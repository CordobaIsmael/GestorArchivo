version: '3.8'

services:
  db:
    image: ankane/pgvector:v0.5.1
    container_name: finanzas_db
    restart: always
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Script de inicialización para crear la base de datos de Evolution API (evolution_db)
      - ./docker/db-init:/docker-entrypoint-initdb.d
    networks:
      - finanzas_net

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: finanzas_n8n
    restart: always
    ports:
      - "${N8N_PORT}:5678"
    environment:
      - N8N_PORT=${N8N_PORT}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_USER_MANAGEMENT_DISABLED=${N8N_USER_MANAGEMENT_DISABLED}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - db
    networks:
      - finanzas_net

  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: finanzas_evolution
    restart: always
    ports:
      - "${EVOLUTION_PORT}:8080"
    environment:
      - PORT=8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      # Conexión Postgres para guardar estados y sesiones (Sin Redis)
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/evolution_db?sslmode=disable
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - REDIS_ENABLED=false
    volumes:
      - evolution_data:/evolution/instances
    depends_on:
      - db
    networks:
      - finanzas_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finanzas_backend
    restart: always
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - RUNNING_IN_DOCKER=true
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - db
    networks:
      - finanzas_net

networks:
  finanzas_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  n8n_data:
    driver: local
  evolution_data:
    driver: local
